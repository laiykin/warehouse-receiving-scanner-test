<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f6f55" />
    <title>Warehouse Receiving</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css?v=6" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="side-rail" aria-label="Primary navigation">
        <div class="brand-lockup" aria-label="Warehouse Receiving">
          <div class="brand-mark">WR</div>
          <div>
            <strong>Warehouse</strong>
            <span>Receiving</span>
          </div>
        </div>

        <nav class="rail-nav" id="rail-nav"></nav>

        <div class="rail-footer">
          <span class="sync-dot" aria-hidden="true"></span>
          <div>
            <strong>Local pilot</strong>
            <span>Saved on this device</span>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <header class="top-bar">
          <button class="icon-button mobile-nav-toggle" type="button" aria-label="Toggle navigation" data-action="toggle-nav">
            <span aria-hidden="true">☰</span>
          </button>
          <div class="top-title">
            <h1 id="screen-title">Receiving</h1>
            <p id="screen-subtitle">Scan product and location, then post inventory.</p>
          </div>
          <div class="top-actions">
            <label class="global-search" aria-label="Quick lookup">
              <span aria-hidden="true">⌕</span>
              <input id="global-search" type="search" placeholder="SKU, location, PO..." autocomplete="off" />
            </label>
            <button class="ghost-button" type="button" data-action="export-transactions">
              <span aria-hidden="true">⇩</span>
              Export
            </button>
          </div>
        </header>

        <section class="content-area" id="app-root" aria-live="polite"></section>
      </main>
    </div>

    <dialog class="scan-dialog" id="scan-dialog">
      <div class="scan-shell">
        <div class="scan-header">
          <div>
            <strong id="scan-title">Scan code</strong>
            <span id="scan-help">Point the camera at a barcode or QR code.</span>
          </div>
          <button class="icon-button" type="button" aria-label="Close scanner" data-action="close-scanner">×</button>
        </div>
        <div class="scanner-frame">
          <video id="scan-video" playsinline muted></video>
          <div class="scanner-reticle" aria-hidden="true"></div>
        </div>
        <p class="scan-status" id="scan-status">Starting camera...</p>
      </div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js?v=6"></script>
  </body>
</html>
